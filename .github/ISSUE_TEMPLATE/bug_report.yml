name: Bug report
description: Report a reproducible problem in Vision Guard PC
title: "[Bug]: "
labels:

* bug
  body:

* type: markdown
  attributes:
  value: |
  Thank you for helping improve Vision Guard PC.

  ```
  Do not include passwords, private documents, personal messages, or other sensitive information.
  ```

* type: input
  id: version
  attributes:
  label: Vision Guard PC version
  placeholder: "Example: 1.0.0"
  validations:
  required: true

* type: dropdown
  id: operating-system
  attributes:
  label: Operating system
  options:
  - Windows 11
  - Windows 10
  - Other
  validations:
  required: true

* type: textarea
  id: description
  attributes:
  label: Problem description
  description: Describe what happened.
  validations:
  required: true

* type: textarea
  id: steps
  attributes:
  label: Steps to reproduce
  placeholder: |
  1. Open...
  2. Click...
  3. Observe...
  validations:
  required: true

* type: textarea
  id: expected
  attributes:
  label: Expected behaviour
  validations:
  required: true

* type: textarea
  id: additional-information
  attributes:
  label: Additional information
  description: Add logs or screenshots without sensitive information.

* type: checkboxes
  id: confirmation
  attributes:
  label: Confirmation
  options:
  - label: I downloaded Vision Guard PC from an official source.
  required: true
  - label: I checked that this problem has not already been reported.
  required: true
